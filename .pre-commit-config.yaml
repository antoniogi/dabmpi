repos:
  # 1. Standard Hygiene Hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 2. Linting & Formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-check
      - id: ruff-format

  # 3. Type Checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        exclude: ^tests/

  # 4. Local Test Suite
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest-fast
        # Uses a marker instead of hardcoded file names
        entry: pytest -m fast
        language: system
        pass_filenames: false
        always_run: true
